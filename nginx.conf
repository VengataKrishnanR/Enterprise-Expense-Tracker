# nginx config for the React SPA.
# PLACE THIS AT: frontend/nginx.conf  in your repo.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve static files; fall back to index.html so client-side routing works
    # (e.g. refreshing /dashboard doesn't 404).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
