# =============================================================================
#  docker-compose.yml  —  run the to-do app with a single command
#
#  Docker Compose lets you define and run one or MORE containers using a single
#  YAML file, instead of typing long `docker build`/`docker run` commands.
#
#  Start everything:   docker compose up --build
#  Stop everything:    docker compose down
# =============================================================================

# "services" = the list of containers Compose will manage. Each key under it
# (here: "todo") is one service = one container.
services:

  todo:
    # ---- how to get the image -------------------------------------------
    # "build" tells Compose to BUILD an image from a Dockerfile instead of
    # pulling a prebuilt one. "context: ." = build using this folder.
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: "compose-1"   # passed to the Dockerfile's ARG APP_VERSION

    # Also tag the built image with a friendly name.
    image: todo:compose-1

    # A stable container name (otherwise Compose auto-generates one).
    container_name: todo-app

    # ---- ports ----------------------------------------------------------
    # "HOST:CONTAINER" — reach the app at localhost:8080 on your machine,
    # which maps to port 8080 inside the container (where Spring Boot listens).
    ports:
      - "8080:8080"

    # ---- environment variables inside the container --------------------
    environment:
      APP_VERSION: "compose-1"

    # ---- restart policy -------------------------------------------------
    # Restart the container if it crashes or the box reboots (but not if you
    # manually stop it).
    restart: unless-stopped

    # ---- health check ---------------------------------------------------
    # Compose periodically runs this command INSIDE the container to decide if
    # the app is "healthy". Here we curl the app's own endpoint.
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/todos"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s        # grace period while Spring Boot boots

    # ---- network --------------------------------------------------------
    networks:
      - todo-net

# -----------------------------------------------------------------------------
