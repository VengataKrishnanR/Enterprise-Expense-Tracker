# "networks" = private virtual networks so services can talk to each other by
# name (e.g. the app could reach the db at hostname "db"). Compose creates one
# automatically, but naming it makes the intent explicit.
networks:
  todo-net:
    driver: bridge

# "volumes" = named, persistent storage that survives container restarts.
# Only needed by the optional db above; harmless to keep declared.
volumes:
  todo-db-data:
